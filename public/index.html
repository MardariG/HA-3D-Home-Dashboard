<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Home Dashboard</title>

  <!--
    Sweet Home 3D engine scripts (readable build: the same set as the
    editor — the dashboard uses the engine as scene BUILDER and renders
    with Three.js, see src/dashboard3d.js). The ordered list lives in
    webpack.config.js (EDITOR_SCRIPTS); production loads the concatenated
    editor-lib.js.
  -->
  <% engineScripts.forEach(function(script) { %><script type="text/javascript" src="<%= script %>"></script>
<% }); %>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #1a1a2e; }
    #container { position: absolute; inset: 0; }
    #status {
      position: fixed; top: 10px; left: 10px; z-index: 10;
      color: #fff; font: 13px/1.5 system-ui, sans-serif;
      background: rgba(0,0,0,.5); padding: 6px 12px; border-radius: 6px;
    }
    #status:empty { display: none; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="status">Loading…</div>
</body>
</html>
