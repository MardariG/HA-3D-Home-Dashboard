<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sweet Home 3D — Web Viewer</title>

  <!--
    Sweet Home 3D vendor + transpiled scripts.
    These MUST be loaded in this order, and BEFORE the webpack bundle, because
    they expose the globals (`viewHome`, `HomeRecorder`, `Node3D`, ...) that
    our entry script relies on.

    CopyWebpackPlugin copies them from /public/vendor to /dist/vendor at build.
  -->
  <script defer src="vendor/big.min.js"></script>
  <script defer src="vendor/gl-matrix-min.js"></script>
  <script defer src="vendor/jszip.min.js"></script>
  <script defer src="vendor/core.min.js"></script>
  <script defer src="vendor/geom.min.js"></script>
  <script defer src="vendor/stroke.min.js"></script>
  <script defer src="vendor/batik-svgpathparser.min.js"></script>
  <script defer src="vendor/jsXmlSaxParser.min.js"></script>
  <script defer src="vendor/triangulator.min.js"></script>
  <script defer src="vendor/viewmodel.min.js"></script>
  <script defer src="vendor/viewhome.min.js"></script>
</head>
<body>

  <header>
    <h1>Sweet Home 3D — Web Viewer</h1>
    <div class="sub">Built with webpack • No Java / Ant / JSweet required</div>
  </header>

  <div class="viewer-wrapper">
    <canvas id="viewerCanvas"
            class="viewerComponent"
            width="920"
            height="600"
            tabindex="1"></canvas>

    <div id="viewerProgressDiv">
      <progress id="viewerProgress" class="viewerComponent" value="0" max="200"></progress>
      <label id="viewerProgressLabel" class="viewerComponent">Loading…</label>
    </div>

    <div id="viewerNavigationDiv">
      <input id="aerialView" class="viewerComponent" name="cameraType" type="radio" checked>
      <label class="viewerComponent" for="aerialView">Aerial view</label>
      <input id="virtualVisit" class="viewerComponent" name="cameraType" type="radio">
      <label class="viewerComponent" for="virtualVisit">Virtual visit</label>
      &nbsp;&nbsp;
      <label class="viewerComponent" for="levelsAndCameras">Camera:</label>
      <select id="levelsAndCameras" class="viewerComponent"></select>
    </div>
  </div>

  <footer>
    Powered by <a href="https://www.sweethome3d.com" target="_blank" rel="noopener">Sweet Home 3D</a>
    — Distributed under the GNU General Public License.
  </footer>

</body>
</html>
